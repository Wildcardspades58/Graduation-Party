<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amelia's Graduation Celebration</title>
    <!-- Google Fonts for High-End Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0d11 0%, #1a1a24 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --gold-primary: #d4af37;
            --gold-secondary: #aa7c11;
            --gold-gradient: linear-gradient(135deg, #f3e5ab 0%, #d4af37 50%, #aa7c11 100%);
            --text-light: #f5f5f7;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient geometric background glow for graphic depth */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 15%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(170, 124, 17, 0.05) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 10%;
            z-index: 0;
        }

        /* Main Glassmorphic Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Graphic Design Accents */
        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
        }
        .top-left { top: 20px; left: 20px; border-top-color: var(--gold-secondary); border-left-color: var(--gold-secondary); }
        .top-right { top: 20px; right: 20px; border-top-color: var(--gold-secondary); border-right-color: var(--gold-secondary); }
        .bottom-left { bottom: 20px; left: 20px; border-bottom-color: var(--gold-secondary); border-left-color: var(--gold-secondary); }
        .bottom-right { bottom: 20px; right: 20px; border-bottom-color: var(--gold-secondary); border-right-color: var(--gold-secondary); }

        /* Typography */
        .header-prefix {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--gold-primary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* Divider Graphic */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
        }
        .divider .line {
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, var(--gold-secondary), transparent);
        }
        .divider .diamond {
            width: 6px;
            height: 6px;
            background: var(--gold-primary);
            transform: rotate(45deg);
            margin: 0 10px;
        }

        /* Event Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        @media (min-width: 480px) {
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }
        
        .detail-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.03);
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--gold-primary);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.4;
        }

        /* RSVP Form Styling */
        form {
            text-align: left;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        /* Radio Toggle for Attendance */
        .attendance-toggle {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-btn {
            flex: 1;
            position: relative;
        }

        .radio-btn input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .radio-label {
            display: block;
            text-align: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .radio-btn input[type="radio"]:checked + .radio-label {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold-primary);
            color: var(--gold-primary);
            font-weight: 600;
        }

        /* Premium Submit Button */
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 10px;
            color: #0d0d11;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(170, 124, 17, 0.2);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            filter: brightness(1.05);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Graphic Corner Borders -->
        <div class="corner-accent top-left"></div>
        <div class="corner-accent top-right"></div>
        <div class="corner-accent bottom-left"></div>
        <div class="corner-accent bottom-right"></div>

        <!-- Header -->
        <div class="header-prefix">In Honor of the Graduate</div>
        <h1>Amelia</h1>
        <div class="subtitle">Graduation Celebration</div>

        <div class="divider">
            <div class="line"></div>
            <div class="diamond"></div>
            <div class="line"></div>
        </div>

        <!-- Event Details Block -->
        <div class="details-grid">
            <div class="detail-item">
                <div class="detail-label">Date & Time</div>
                <div class="detail-value">Saturday, June 20th, 2026<br>4:00 PM – 8:00 PM</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Location</div>
                <div class="detail-value">The HOA Community Facility<br>[Insert Street Address Here]</div>
            </div>
        </div>

        <!-- RSVP Form Section -->
        <form id="rsvpForm">
            <div class="form-group">
                <label for="fullName">Your Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe" required>
            </div>

            <div class="form-group">
                <label>Will you be attending?</label>
                <div class="attendance-toggle">
                    <div class="radio-btn">
                        <input type="radio" id="attendYes" name="attendance" value="yes" checked>
                        <label for="attendYes" class="radio-label">Accepts with Pleasure</label>
                    </div>
                    <div class="radio-btn">
                        <input type="radio" id="attendNo" name="attendance" value="no">
                        <label for="attendNo" class="radio-label">Declines with Regret</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <select id="guests" name="guests">
                    <option value="1">1 Person</option>
                    <option value="2">2 People</option>
                    <option value="3">3 People</option>
                    <option value="4">4 People</option>
                    <option value="5+">5+ People</option>
                </select>
            </div>

            <button type="submit">Submit RSVP</button>
        </form>
    </div>

    <script>
        // Form submission placeholder to connect seamlessly with backend scripts later
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('fullName').value,
                attending: document.querySelector('input[name="attendance"]:checked').value,
                guests: document.getElementById('guests').value
            };
            
            console.log('RSVP Data Captured:', formData);
            alert('Thank you! Your RSVP has been captured.');
            // This is where we will hook up your Google Sheets or form notification triggers next.
        });
    </script>
</body>
</html>
